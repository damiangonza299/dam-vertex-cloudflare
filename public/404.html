<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — Dam Vertex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e2e2e2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 420px; }
    .code {
      font-size: clamp(64px, 15vw, 96px);
      font-weight: 800;
      color: rgba(255,255,255,.08);
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,.45);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all .15s;
    }
    .primary {
      background: #fff;
      color: #000;
    }
    .primary:hover { opacity: .85; }
    .secondary {
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.6);
      border: 1px solid rgba(255,255,255,.1);
    }
    .secondary:hover { border-color: rgba(255,255,255,.25); color: #fff; }
    .brand {
      margin-top: 48px;
      font-size: 11px;
      color: rgba(255,255,255,.15);
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscás no existe o fue movida. Podés volver al inicio o ver nuestros productos.</p>
    <div class="links">
      <a href="/" class="primary">Ir al inicio</a>
      <a href="/productos/" class="secondary">Ver productos</a>
    </div>
    <div class="brand">DAM VERTEX</div>
  </div>
</body>
</html>
