name: BQE Scorer — Periódico

# Corre cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
# En Paraguay PYT (UTC-4): 20:00, 02:00, 08:00, 14:00
# Máximo lag entre nuevo lead y lead_quality: 6 horas.
#
# Llama a POST /api/intelligence/run-bqe para clasificar:
#   - Leads nuevos sin entrada en lead_quality
#   - Leads cuya score_version cambió
#   - Leads purchased/cancelled cuyo status_snapshot no se actualizó
#
# NO modifica la tabla leads.
# NO envía eventos a Meta Ads / Pixel / CAPI.
# NO toca Purchase ni QualifiedLead.
# Solo escribe en lead_quality.
#
# Requiere: secret ADMIN_PASSWORD en GitHub → Settings → Secrets → Actions

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  score-leads:
    name: Clasificar leads nuevos y actualizables
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # VS Code YAML linter no puede leer GitHub Secrets y marca falso positivo.
      # Mover a env del job resuelve la advertencia y mantiene el comportamiento identico.
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: POST /api/intelligence/run-bqe
        run: |
          HTTP=$(curl -s \
            -o /tmp/bqe_result.json \
            -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://dam-vertex-cloudflare.pages.dev/api/intelligence/run-bqe)

          echo "HTTP Status: $HTTP"
          echo "Response:"
          cat /tmp/bqe_result.json

          if [ "$HTTP" != "200" ]; then
            echo "ERROR: run-bqe returned $HTTP"
            exit 1
          fi

      - name: Verificar resultado
        run: |
          PROCESSED=$(cat /tmp/bqe_result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('processed', 0))")
          TOTAL=$(cat /tmp/bqe_result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_leads', 0))")
          echo "Leads procesables: $TOTAL"
          echo "Leads clasificados: $PROCESSED"
