name: Dam Intelligence — Alertas Diarias Telegram

# Corre todos los días a 11:00 UTC
# En Paraguay PYT (UTC-4):  07:00 AM (invierno)
# En Paraguay PYST (UTC-3): 08:00 AM (verano / DST)
#
# Genera alertas de Dam Intelligence y las envía al grupo exclusivo Telegram:
#   - creative_dead      🚨 creativo muerto
#   - garbage_risk       🚨 tráfico basura (por creativo o ciudad)
#   - conversion_drop    🚨 caída de conversión global
#   - creative_scalable  ℹ️ creativo escalable
#   - winning_city       ℹ️ ciudad ganadora
#   - buyer_type_increase ℹ️ aumento de compradores premium
#
# Si no hay alertas activas, no envía mensajes.
#
# NO pausa anuncios. NO modifica Meta Ads. NO toca Purchase ni CAPI.
# Solo lectura de D1 + envío de texto a Telegram.
#
# Requiere secrets en GitHub → Settings → Secrets → Actions:
#   ADMIN_PASSWORD                — contraseña del admin panel
#   (TELEGRAM_BOT_TOKEN y TELEGRAM_INTELLIGENCE_CHAT_ID se configuran
#    como secrets de Cloudflare Pages, no como secrets de GitHub)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  send-alerts:
    name: Enviar alertas Dam Intelligence a Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: POST /api/intelligence/send-alerts
        run: |
          HTTP=$(curl -s \
            -o /tmp/alerts_result.json \
            -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_PASSWORD }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            https://dam-vertex-cloudflare.pages.dev/api/intelligence/send-alerts)

          echo "HTTP Status: $HTTP"
          echo "Response:"
          cat /tmp/alerts_result.json

          if [ "$HTTP" != "200" ]; then
            echo "::warning::send-alerts returned HTTP $HTTP"
          fi

      - name: Verificar resultado
        run: |
          SENT=$(cat /tmp/alerts_result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sent', 0))")
          TOTAL=$(cat /tmp/alerts_result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_alerts', 0))")
          echo "Alertas detectadas: $TOTAL"
          echo "Alertas enviadas a Telegram: $SENT"
